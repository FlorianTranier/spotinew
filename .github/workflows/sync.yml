name: spotinew — sync playlist

on:
  schedule:
    # Tous les jours à 02:00 UTC = 04:00 à Paris en été (CEST), 03:00 en hiver (CET).
    # Décalé de 2 h pour laisser le temps aux sorties du jour d'apparaître dans
    # le catalogue Spotify avant le scan.
    - cron: "0 2 * * *"
  workflow_dispatch: {} # permet aussi de lancer manuellement depuis l'onglet Actions

# Nécessaire pour que le workflow puisse committer state.json (date du dernier scan).
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Synchroniser la playlist
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          START_DATE: ${{ vars.START_DATE }}
          SPOTIFY_PLAYLIST_NAME: ${{ vars.SPOTIFY_PLAYLIST_NAME }}
          SPOTIFY_PLAYLIST_ID: ${{ vars.SPOTIFY_PLAYLIST_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/sync.py

      - name: Persister la date du dernier scan
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: date du dernier scan [skip ci]"
            git push
          else
            echo "state.json inchangé — rien à committer."
          fi
