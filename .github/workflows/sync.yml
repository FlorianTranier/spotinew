name: spotinew — sync playlist

on:
  schedule:
    # Tous les jours à 06:00 UTC (08:00 heure de Paris en été, 07:00 en hiver).
    - cron: "0 6 * * *"
  workflow_dispatch: {} # permet aussi de lancer manuellement depuis l'onglet Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Synchroniser la playlist
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          START_DATE: ${{ vars.START_DATE }}
          SPOTIFY_PLAYLIST_NAME: ${{ vars.SPOTIFY_PLAYLIST_NAME }}
          SPOTIFY_PLAYLIST_ID: ${{ vars.SPOTIFY_PLAYLIST_ID }}
        run: python src/sync.py
